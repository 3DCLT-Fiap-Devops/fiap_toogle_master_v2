apiVersion: v1
kind: ConfigMap
metadata:
  name: targeting-service-config
  namespace: toogle-master
data:
  PORT: "8003"
  AUTH_SERVICE_URL: "http://auth-service.toogle-master.svc.cluster.local:8001"

---
apiVersion: v1
kind: Secret
metadata:
  name: targeting-service-secret
  namespace: toogle-master
type: Opaque
data:
  # DATABASE_URL: cG9zdGdyZXM6Ly9kYnVzZXI6U2VuaGFUZXN0ZTEyM0B0YXJnZXRpbmctZGIuYzNnNmtvOHBtcXQyLnVzLWVhc3QtMS5yZHMuYW1hem9uYXdzLmNvbTo1NDMyL3RhcmdldGluZ19kYg==
  DATABASE_URL: cG9zdGdyZXM6Ly9kYnVzZXI6U2VuaGFUZXN0ZTEyM0B0YXJnZXRpbmctZGIuYzNnNmtvOHBtcXQyLnVzLWVhc3QtMS5yZHMuYW1hem9uYXdzLmNvbTo1NDMyL3RhcmdldGluZ19kYg==

---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service
  namespace: toogle-master
spec:
  selector:
    app: targeting-service
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: toogle-master
spec:
  replicas: 2
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      containers:
      - name: targeting-service
        image: 112719111297.dkr.ecr.us-east-1.amazonaws.com/targeting-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: PORT
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: AUTH_SERVICE_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: targeting-service-secret
              key: DATABASE_URL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
